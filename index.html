<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28' font-family='monospace' fill='%2300f0ff'%3Eh%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#07070d" />
    <meta name="description" content="hao · 个人赛博朋克导航站" />
    <title>hao · 导航</title>
    <script>
      (function () {
        try {
          var t = JSON.parse(localStorage.getItem('hao:theme') || '"dark"');
          var root = document.documentElement;
          if (t === 'light') { root.classList.add('theme-light'); root.classList.remove('dark'); }
          else { root.classList.add('dark'); }
        } catch (e) { document.documentElement.classList.add('dark'); }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
